databases:
  - name: chocoloco-db
    databaseName: chocoloco
    user: chocoloco
    plan: free

services:
  - type: web
    name: chocoloco-mvp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chocoloco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ODOO_URL
        sync: false
      - key: ODOO_DB
        sync: false
      - key: ODOO_USERNAME
        sync: false
      - key: ODOO_PASSWORD
        sync: false
      - key: ODOO_LIVECHAT_SUPPORT_EMAILS
        sync: false
