<!doctype html>
<html data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chocobot Dark Preview</title>
  <link rel="stylesheet" href="app/static/style.css">
  <style>body{padding:2rem}.container{max-width:900px;margin:0 auto}</style>
</head>
<body>
  <div class="container chocobot-page">
    <div class="chocobot-hero">
      <div>
        <p class="chocobot-hero-eyebrow">Klantenservice</p>
        <h1>Chocobot (preview)</h1>
        <p>Stel je vragen aan onze AI-assistent.</p>
      </div>
    </div>

    <div class="chocobot-card">
      <div class="chocobot-chat" id="chat">
        <div class="chocobot-message-row bot-row">
          <img class="chocobot-avatar" src="app/static/images/chocobot-avatar.svg" alt="bot" />
          <div class="bot-message chocobot-bubble">Hallo! Waar kan ik mee helpen?</div>
        </div>
      </div>
      <div class="chocobot-composer">
        <input id="msg" type="text" placeholder="Typ je vraag..." />
        <button id="send" class="btn chocobot-send">Stuur</button>
      </div>
    </div>
  </div>
</body>
</html>
