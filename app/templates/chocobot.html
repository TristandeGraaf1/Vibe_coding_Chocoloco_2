{% extends 'base.html' %}

{% block content %}
<div class="container chocobot-page">
  <div class="chocobot-card">
    <div class="chocobot-header">
      <div>
        <p class="chocobot-eyebrow">AI-assistent</p>
        <h2>Chocobot</h2>
      </div>
      <span class="chocobot-status">Online</span>
    </div>

    <div class="chocobot-chat" id="chat" aria-live="polite" aria-label="Chatberichtenscherm">
    </div>

    <div class="chocobot-composer">
      <input id="msg" type="text" placeholder="Typ je vraag..." autocomplete="off" />
      <button id="send" class="btn chocobot-send">Stuur</button>
    </div>
  </div>
</div>

<script>
const sendButton = document.getElementById('send');
const messageInput = document.getElementById('msg');
const chat = document.getElementById('chat');
let typingIndicator = null;
let welcomeTimer = null;

sendButton.addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ sendMessage(); }});

function appendMessage(kind, text){
  if (kind === 'bot') {
    const row = document.createElement('div');
    row.className = 'chocobot-message-row bot-row';

    const avatar = document.createElement('img');
    avatar.className = 'chocobot-avatar';
    avatar.src = "{{ url_for('static', filename='images/chocobot-avatar.svg') }}";
    avatar.alt = 'Chocobot profielfoto';

    const bubble = document.createElement('div');
    bubble.className = 'bot-message chocobot-bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
  } else {
    const el = document.createElement('div');
    el.className = 'user-message chocobot-bubble';
    el.textContent = text;
    chat.appendChild(el);
  }
  chat.scrollTop = chat.scrollHeight;
}

function createTypingIndicator(){
  if (typingIndicator) {
    return typingIndicator;
  }
  const row = document.createElement('div');
  row.className = 'chocobot-message-row bot-row typing-row';

  const avatar = document.createElement('img');
  avatar.className = 'chocobot-avatar';
  avatar.src = "{{ url_for('static', filename='images/chocobot-avatar.svg') }}";
  avatar.alt = 'Chocobot profielfoto';

  typingIndicator = document.createElement('div');
  typingIndicator.className = 'typing-indicator';
  typingIndicator.setAttribute('aria-live', 'polite');
  typingIndicator.innerHTML = '<span class="typing-label">Chocobot is aan het typen</span><span class="typing-dots" aria-hidden="true"><span></span><span></span><span></span></span>';

  row.appendChild(avatar);
  row.appendChild(typingIndicator);
  typingIndicator.dataset.wrapper = 'true';
  typingIndicator = row;
  return typingIndicator;
}

function setTyping(isTyping){
  sendButton.disabled = isTyping;
  messageInput.disabled = isTyping;
  if (isTyping) {
    const indicatorRow = createTypingIndicator();
    if (!indicatorRow.isConnected) {
      chat.appendChild(indicatorRow);
    }
    chat.scrollTop = chat.scrollHeight;
  } else {
    messageInput.focus();
  }
}

function hideTypingIndicator(){
  if (typingIndicator && typingIndicator.isConnected) {
    typingIndicator.remove();
  }
  typingIndicator = null;
  sendButton.disabled = false;
  messageInput.disabled = false;
}

function showWelcomeMessage(){
  const el = document.createElement('div');
  el.className = 'bot-message chocobot-bubble';
  el.textContent = 'Hallo! Stel een vraag over de app of je bestelling.';
  const row = document.createElement('div');
  row.className = 'chocobot-message-row bot-row';

  const avatar = document.createElement('img');
  avatar.className = 'chocobot-avatar';
  avatar.src = "{{ url_for('static', filename='images/chocobot-avatar.svg') }}";
  avatar.alt = 'Chocobot profielfoto';

  row.appendChild(avatar);
  row.appendChild(el);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

setTyping(true);
welcomeTimer = window.setTimeout(function(){
  showWelcomeMessage();
  hideTypingIndicator();
}, 1400);

async function sendMessage(){
  const text = messageInput.value.trim();
  if(!text) return;
  appendMessage('user', text);
  messageInput.value = '';
  setTyping(true);
  try{
    const resp = await fetch('/chocobot/message', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})});
    const data = await resp.json();
    if(data && data.reply){
      appendMessage('bot', data.reply);
    } else if(data && data.error){
      appendMessage('bot', 'Fout: ' + data.error);
    } else {
      appendMessage('bot', 'Geen antwoord ontvangen.');
    }
  }catch(err){
    appendMessage('bot', 'Verbindingsfout: ' + err.message);
  } finally {
    hideTypingIndicator();
  }
}
</script>

<style>
.chocobot-page {
  max-width: 900px;
}

.chocobot-card {
  background: linear-gradient(180deg, rgba(255, 251, 247, 0.98), rgba(255, 245, 237, 0.98));
  border: 1px solid rgba(107, 68, 35, 0.12);
  border-radius: 24px;
  box-shadow: 0 18px 50px rgba(107, 68, 35, 0.14);
  padding: 1.4rem;
}

.chocobot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1rem;
}

.chocobot-eyebrow {
  margin: 0 0 0.25rem 0;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.chocobot-header h2 {
  margin: 0;
}

.chocobot-status {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.45rem 0.8rem;
  border-radius: 999px;
  background: rgba(94, 143, 46, 0.12);
  color: var(--accent-green);
  font-weight: 700;
  font-size: 0.9rem;
}

.chocobot-status::before {
  content: '';
  width: 0.6rem;
  height: 0.6rem;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 0 5px rgba(94, 143, 46, 0.14);
}

.chocobot-chat {
  min-height: 360px;
  max-height: 520px;
  overflow-y: auto;
  padding: 1rem;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,248,241,0.95));
  border: 1px solid rgba(107, 68, 35, 0.1);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.chocobot-message-row {
  display: flex;
  align-items: flex-end;
  gap: 0.7rem;
  max-width: 100%;
}

.bot-row {
  margin-right: auto;
}

.typing-row {
  align-items: center;
}

.chocobot-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  flex: 0 0 42px;
  background: #fff;
  border: 2px solid rgba(107, 68, 35, 0.15);
  box-shadow: 0 8px 18px rgba(107, 68, 35, 0.12);
  padding: 4px;
}

.chocobot-bubble {
  max-width: min(78%, 36rem);
  padding: 0.9rem 1rem;
  border-radius: 18px;
  line-height: 1.5;
  box-shadow: 0 8px 20px rgba(107, 68, 35, 0.08);
}

.bot-message {
  background: #fff9f4;
  color: var(--text-color);
  border: 1px solid rgba(107, 68, 35, 0.1);
  border-top-left-radius: 8px;
}

.user-message {
  margin-left: auto;
  background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
  color: white;
  border-top-right-radius: 8px;
}

.typing-indicator {
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
  width: fit-content;
  padding: 0.8rem 1rem;
  border-radius: 18px;
  background: rgba(212, 165, 116, 0.16);
  color: var(--text-secondary);
  border: 1px solid rgba(212, 165, 116, 0.24);
}

.typing-label {
  font-size: 0.95rem;
}

.typing-dots {
  display: inline-flex;
  align-items: center;
  gap: 0.24rem;
}

.typing-dots span {
  width: 0.45rem;
  height: 0.45rem;
  border-radius: 50%;
  background: var(--primary-color);
  animation: chocobot-bounce 1.2s infinite ease-in-out;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.15s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.3s;
}

.chocobot-composer {
  display: flex;
  gap: 0.8rem;
  margin-top: 1rem;
}

.chocobot-composer input {
  flex: 1;
  border: 1px solid rgba(107, 68, 35, 0.18);
  border-radius: 16px;
  background: var(--card-bg);
  color: var(--text-color);
  padding: 0.95rem 1rem;
  font-size: 1rem;
  box-shadow: inset 0 1px 3px rgba(107, 68, 35, 0.05);
}

.chocobot-composer input:focus {
  outline: 2px solid rgba(107, 68, 35, 0.22);
  outline-offset: 2px;
}

.chocobot-send {
  min-width: 7.5rem;
}

.chocobot-send:disabled {
  opacity: 0.7;
  cursor: wait;
}

@keyframes chocobot-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
  40% { transform: translateY(-4px); opacity: 1; }
}

@media (max-width: 640px) {
  .chocobot-card {
    padding: 1rem;
    border-radius: 18px;
  }

  .chocobot-header,
  .chocobot-composer {
    flex-direction: column;
  }

  .chocobot-status,
  .chocobot-send {
    width: 100%;
    justify-content: center;
  }

  .chocobot-bubble {
    max-width: 100%;
  }

  .chocobot-avatar {
    width: 36px;
    height: 36px;
    flex-basis: 36px;
  }
}
</style>

{% endblock %}
